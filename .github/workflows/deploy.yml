name: Deploy Web Version to GitHub Pages

# Trigger: runs on every push to the main branch
on:
  push:
    branches: [ main ] # Change to "master" if your default branch is master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Required permissions to write to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Ensures only one deployment runs at a time
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust and WebAssembly target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: 'latest'

      - name: Build project with Trunk
        working-directory: ./solage_web
        run: trunk build --release --public-url /solage/solage_web/--no-wasm-opt

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # THE FIX IS HERE: Pointing to the correct output folder!
          path: './solage_web/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
